[project]
name = "pyesb"
dynamic = ["version"]
description = "1C ESB Gateway compatible server"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard-no-fastapi-cloud-cli]>=0.115.0",
    "pyesb-amqp",
]

[project.optional-dependencies]
test = [
    "pytest-asyncio>=1.4.0",
    "httpx>=0.28.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "icecream>=2.2.0",
]

[tool.uv.sources]
pyesb-amqp = { git = "https://github.com/grevinden/pyesb-amqp.git" }
