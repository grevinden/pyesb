[project]
name = "pyesb"
version = "0.1.0"
description = "1C ESB Gateway compatible server"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pyjwt[crypto]>=2.10.0",
    "cryptography>=44.0.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "httpx>=0.28.1",
    "python-qpid-proton>=0.40.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
