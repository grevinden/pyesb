[project]
name = "pyesb"
version = "0.1.0"
description = "1C ESB Gateway compatible server"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard-no-fastapi-cloud-cli]>=0.115.0",
    "uvicorn>=0.34.0",
    "pyjwt[crypto]>=2.10.0",
    "pydantic-settings>=2.0.0",
    "python-qpid-proton>=0.40.0",
]

[project.optional-dependencies]
test = [
    "pytest-asyncio>=1.4.0",
    "httpx>=0.28.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "icecream>=2.2.0",
]
