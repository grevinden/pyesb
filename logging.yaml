version: 1
disable_existing_loggers: false
formatters:
  json:
    (): app.log.JsonlFormatter
handlers:
  console:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stdout
root:
  level: INFO
  handlers: [console]
loggers:
  uvicorn:
    level: INFO
  apscheduler:
    level: INFO
