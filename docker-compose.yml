# Docker Compose configuration for local development and testing

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - LOG_LEVEL=debug
    volumes:
      # Mount keys directory for persistent RSA key storage
      - ./keys:/app/keys
      # Mount app directory for development (optional)
      # - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9090/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - pyesb-network

  # Optional: Test service for running integration tests against the container
  tests:
    image: python:3.12-slim
    depends_on:
      app:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "pip install pytest httpx pytest-asyncio &&
             python -m pytest tests/integration/test_docker_integration.py -v"
    networks:
      - pyesb-network

networks:
  pyesb-network:
    driver: bridge
